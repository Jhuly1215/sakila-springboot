server:
  port: 8083

spring:
  application:
    name: customer-service
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/sakila?useSSL=false&serverTimezone=UTC}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true

eureka:
  client:
    serviceUrl:
      defaultZone: ${EUREKA_SERVER:http://localhost:8761/eureka/}

springdoc:
  api-docs:
    path: /customer/v3/api-docs

