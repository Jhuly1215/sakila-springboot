server:
  port: 8081

spring:
  application:
    name: auth-service
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/sakila?useSSL=false&serverTimezone=UTC}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

eureka:
  client:
    serviceUrl:
      defaultZone: ${EUREKA_SERVER:http://localhost:8761/eureka/}

jwt:
  secret: ${JWT_SECRET:SakilaSecretKeyForJWTAuthSystemMicroservicesProfessionalCode2026}
  expiration: ${JWT_EXPIRATION:86400000}

springdoc:
  api-docs:
    path: /auth/v3/api-docs

